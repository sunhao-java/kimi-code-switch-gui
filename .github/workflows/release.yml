name: Release Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release view "${VERSION}" >/dev/null 2>&1 || gh release create "${VERSION}" --generate-notes

  build:
    name: Build ${{ matrix.os-name }}
    runs-on: ${{ matrix.runner }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-name: macos
            runner: macos-latest
            build-command: npm run dist:mac -- --x64 --arm64
          - os-name: windows
            runner: windows-latest
            build-command: npm run dist:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: ${{ matrix.build-command }}

      - name: Generate checksums
        env:
          CHECKSUM_FILE: SHA256SUMS-${{ matrix.os-name }}.txt
        shell: bash
        run: |
          node -e "const fs = require('fs'); const crypto = require('crypto'); const path = require('path'); const dir = 'release'; const files = fs.readdirSync(dir).filter((file) => /\.(dmg|zip|exe|blockmap|ya?ml)$/i.test(file)).sort(); const lines = files.map((file) => crypto.createHash('sha256').update(fs.readFileSync(path.join(dir, file))).digest('hex') + '  ' + file); fs.writeFileSync(path.join(dir, process.env.CHECKSUM_FILE), lines.join('\n') + '\n');"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os-name }}-installers
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.yml
            release/*.yaml
            release/SHA256SUMS-${{ matrix.os-name }}.txt
          if-no-files-found: error

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          test -n "$(find release -maxdepth 1 -type f -print -quit)"
          find release -maxdepth 1 -type f -exec gh release upload "${VERSION}" {} --clobber \;

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs:
      - build
    env:
      TAP_REPO_URL: https://github.com/sunhao-java/homebrew-kimi-code-switch.git
      TAP_REPO_DIR: homebrew-kimi-code-switch
      CASK_PATH: Casks/kimi-code-switch-gui.rb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub token for tap repo
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          test -n "${TAP_GITHUB_TOKEN}"

      - name: Compute release checksums
        id: checksums
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V="${VERSION#v}"
          ARM64_FILE="artifacts/macos-installers/kimi-code-switch-gui-${VERSION_NO_V}-mac-arm64.dmg"
          AMD64_FILE="artifacts/macos-installers/kimi-code-switch-gui-${VERSION_NO_V}-mac-x64.dmg"
          echo "arm64=$(sha256sum "${ARM64_FILE}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "amd64=$(sha256sum "${AMD64_FILE}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Clone tap repository
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@${TAP_REPO_URL#https://}" "${TAP_REPO_DIR}"

      - name: Render cask
        env:
          VERSION: ${{ github.ref_name }}
          GITHUB_REPO: ${{ github.repository }}
          ARM64_SHA256: ${{ steps.checksums.outputs.arm64 }}
          AMD64_SHA256: ${{ steps.checksums.outputs.amd64 }}
        run: |
          VERSION_NO_V="${VERSION#v}"
          python scripts/render_homebrew_cask.py \
            --version "${VERSION_NO_V}" \
            --github-repo "${GITHUB_REPO}" \
            --arm64-sha256 "${ARM64_SHA256}" \
            --amd64-sha256 "${AMD64_SHA256}" \
            --output "${TAP_REPO_DIR}/${CASK_PATH}"

      - name: Commit and push tap update
        working-directory: ${{ env.TAP_REPO_DIR }}
        env:
          VERSION: ${{ github.ref_name }}
          CASK_PATH: ${{ env.CASK_PATH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${CASK_PATH}"
          if git diff --cached --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi
          git commit -m "chore: update kimi-code-switch-gui ${VERSION#v}"
          git push origin HEAD
